<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JU-Delivery</title>
    <link rel="icon" href="./images/logo.png">
    <!-- fonts -->


    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- css -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="container">
            <nav class="navbar navbar-expand-lg ">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#main">
                        <img src="./images/delivery-man.png" width="70px" alt="">
                    </a>
                    <h4 class="special-header"> JU-Delivery</h4>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="#">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link ms-auto d-flex" href="#">Restaurants' Login</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <section class="main padding100  p-relative" id="main">
        <div class="container p-absolute d-flex justify-content-center align-items-center">
            <div class="row p-relative">

                <div class="col-md-6 my-auto">
                    <h1 class="special-header text-center">welcome to our university food Delivery website!</h1>
                    <div class="imge mt-4 d-flex justify-content-center">
                        <img src="./images/logo.png" width="200px" alt="">
                    </div>
                </div>

                <div class="col-md-6 d-flex justify-content-center align-items-center">
                    <form>
                        <ul class="ps-0 mb-3 list-group">
                            <a href="./ordering.html">
                                <li class="list-group-item">Order Food</li>
                            </a>
                        </ul>

                        <ul class="ps-0 mb-3 list-group">
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Deliver Food
                                <span class="badge rounded-pill" data-target="orders" id="orders">1</span>
                            </li>
                        </ul>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
