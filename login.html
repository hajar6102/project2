<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JU-Delivery</title>
    <link rel="icon" href="./images/logo.png">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">
    <div id="slider" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="./images/ju3.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./images/snackway.jpg" class="d-block w-100" alt="...">
            </div>  
            <div class="carousel-item">
                <img src="./images/a3mal-saj.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./images/medicine-milkbar.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
                <img src="./images/student-snackway.jpg" class="d-block w-100" alt="...">
            </div>
        </div>
    </div>
    <!-- Header Section -->
    <header class="fixed-top">
        <nav class="navbar navbar-expand-lg navbar-light">
            <div class="container-fluid">
                <a class="navbar-brand" href="#main">
                    <img src="./images/delivery-man.png" width="70px" alt="Delivery Man Logo">
                </a>
                <h4 style="color: white;">JU-Delivery</h4>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <!-- Uncomment and add more navigation items as needed -->
                        <!--<li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>-->
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Section -->
    <section class="container d-flex justify-content-center align-items-center min-vh-100">
        <form id="signupForm" action="./restsystem.html" method="post" class="bg-white p-4 rounded-3 shadow-lg"
            style="max-width: 400px; width: 100%;">
            <h1 class="text-center mb-4">Log In</h1>

            <!-- Phone Number Input -->
            <div class="mb-3">
                <input type="text" id="phone" name="phone" class="form-control custom-input" placeholder="Phone Number" required>
            </div>

            <!-- Password Input -->
            <div class="mb-3">
                <input type="password" id="password" name="password" class="form-control custom-input" placeholder="Password"
                    required>
            </div>

            <!-- Submit Button -->
            <div class="d-grid">
                <button type="submit" class="btn Custom-secondary">Submit</button>
            </div>

            <!-- Sign Up Link -->
            <div class="text-center mt-3">
                <p>Don't have an account?
                    <a href="./signup.html">Sign Up</a>
                </p>
            </div>
        </form>
    </section>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous">
    </script>

</body>

</html>
