<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JU-Delivery</title>
    <link rel="icon" href="./images/logo.png">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body class="restsystem-page">

    <header>
        <div class="container">
            <nav class="navbar navbar-expand-lg ">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#main">
                        <img src="./images/delivery-man.png" width="70px" alt="">
                    </a>
                    <h4 class="special-header"> JU-Delivery</h4>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link active pt-3" aria-current="page" href="#">Log out</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link ms-auto d-flex" href="./profilepage.html"><img id="header-profile-image" width="40px"
                                        src="./images/profile logo.png" /></a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <div class="container text-center my-4 centered-section">
        <div class="d-flex justify-content-center mb-4">
            <button id="addNewItemButton" class="btn Custom-primery small-button mx-2">Add New Item</button>
            <button id="editMenuItemsButton" class="btn Custom-primery small-button mx-2">Edit Menu Items</button>
        </div>

        <div id="mainContent" class="form-container">
            <h1>Restaurant Menu Management</h1><br>
            <form id="addDishForm" class="menu">
                <h2>Add New Item</h2>
                <div class="mb-3">
                    <input type="text" id="dishName" class="form-control" placeholder="Item Name" required />
                </div>
                <div class="mb-3">
                    <input type="number" id="dishPrice" class="form-control" placeholder="Item Price" required />
                </div>
                <div class="mb-3">
                    <input type="file" id="dishImage" class="form-control" accept="image/*" required />
                </div>
                <button type="submit" class="btn Custom-secondary">Add Item</button>
            </form><br>

            <div id="editMenuForm" class="hidden">
                <h2>Edit Menu Items</h2>
                <div id="menuList" class="row g-3 menu-list"></div>
            </div>
        </div>
    </div>
    

    <script src="./restsystem.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
